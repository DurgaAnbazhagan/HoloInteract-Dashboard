<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel ="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="dashboard">
    <div class="sidebar">
        <h2>HoloInteract</h2>
        <ul>
            <li><i class="fa-solid fa-house"></i> Dashboard</li>
            <li><i class="fa-solid fa-microchip"></i> Devices</li>
            <li><i class="fa-solid fa-chart-line"></i> Analytics</li>
            <li class="active"><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
            <li><i class="fa-solid fa-right-from-bracket"></i> Logout</li>
        </ul>
    </div>
    <div class="main-content">
        <h1>Settings</h1>
        <p>Manage your account preferences.</p>
        <div class="settings-box">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            <label>Password</label>
            <input type="password" id="password"  placeholder="Enter your password">
            <button id="saveBtn">Save Changes</button>
        </div>
    </div>
  </div>  
  <script src="js/settings.js"></script>
</body>
</html>
