<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloInteract Dashboard</title>
    <link rel ="stylesheet" href ="css/style.css">
    <!-- Google Font -->
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel = "stylesheet">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

<div class="dashboard">

    <div class="sidebar">
        <h2>HoloInteract</h2>

        <ul>
            <li class="active">
                <a href="dashboard.html">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
            </li>

           <li id="devicesBtn">
   <i class="fas fa-microchip"></i>
   <span>Devices</span>
</li>

            <li>
                <a href="analytics.html">
                    <i class="fa-solid fa-chart-line"></i> Analytics
                </a>
            </li>

            <li>
                <a href="settings.html">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
            </li>

           
<li id="logoutBtn">
   <i class="fas fa-sign-out-alt"></i>
   <span>Logout</span>
</li>
        </ul>
    </div>

    <div class="main-content">
    <h1>Devices Dashboard</h1>

    <div class="stats">
    <div class="card">
        <h3>Total Devices</h3>
        <h2 id="totalDevices">0</h2>
    </div>

    <div class="card">
        <h3>Active Devices</h3>
        <h2 id="activeDevices">0</h2>
    </div>

    <div class="card">
        <h3>Offline Devices</h3>
        <h2 id="offlineDevices">0</h2>
    </div>

    <div class="card">
        <h3>Campaigns</h3>
        <h2 id="campaigns">5</h2>
    </div>
</div>

    <div class="search-container">
    <input
        type="text"
        id="searchInput"
        placeholder="Search devices..."
    >
</div>

<table class="device-table">
        <thead>
            <tr>
                <th>Device</th>
                <th>Location</th>
                <th>Status</th>
                <th>Last Active</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="deviceTable">
        </tbody>
    </table>
</div>

</div>

<script src="js/data.js"></script>
<script src="js/dashboard.js"></script>
<script>
    const devicesBtn = document.getElementById("devicesBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    devicesBtn.addEventListener("click", () => {
        window.location.href = "devices.html";
    });

    logoutBtn.addEventListener("click", () => {
       window.location.href = "index.html";
    });
</script>
</body>
</html>
