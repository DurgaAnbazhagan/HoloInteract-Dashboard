<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloInteract Dashboard-Login</title>
    <link rel ="stylesheet" href ="css/style.css">
    <!-- using Google Font -->
 <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h1>HoloInteract</h1>
            <h2>Dashboard Management</h2>
            <p>Monitor all your interactive devices,
            view analytics, and manage campaigns
            from one dashboard.</p>
        </div>
        <div class="login-card">
            <h2>Welcome Back </h2>   
            <p>login to continue</p>
            <form>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                     </div>
                     <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Password" required>
                     </div>
                     <div class="options">
                        <label>
                            <input type="checkbox">Remember me</input>
                            </label>
                            <a href="#">Forget Password?</a>
                             
                     </div>
                     <button type="Button" onclick="window.location.href='dashboard.html'">Login</button>
                </form>
    </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
